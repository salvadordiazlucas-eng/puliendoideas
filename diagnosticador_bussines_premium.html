<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Estratégico de Negocio Local</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --border-color: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #0ea5e9;
            --accent-hover: #0284c7;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        #resultado {
            margin-top: 30px;
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .result-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-weight: bold;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Diagnóstico Estratégico de Negocio Local</h1>
        <p>Análisis de presencia, interacción con clientes y potencial de conversión</p>
    </div>

    <div class="card">
        <form id="diagnosticForm">
            <div class="form-group">
                <label for="apiKey">CLAVE API DE GOOGLE CLOUD</label>
                <input type="password" id="apiKey" placeholder="Pega aquí tu API Key de Google" required>
            </div>

            <div class="form-group">
                <label for="businessName">NOMBRE DEL NEGOCIO A AUDITAR</label>
                <input type="text" id="businessName" placeholder="Ej: Fogoncito Majadahonda" required>
            </div>

            <div class="form-group">
                <label for="keywords">PALABRAS CLAVE + LOCALIDAD (SEPARADAS POR COMA)</label>
                <input type="text" id="keywords" placeholder="Ej: Restaurante mexicano Majadahonda, Tacos Majadahonda" required>
            </div>

            <button type="submit" class="btn-submit">GENERAR DIAGNÓSTICO ESTRATÉGICO</button>
        </form>
    </div>

    <div id="resultado"></div>
</div>

<script>
document.getElementById('diagnosticForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const apiKey = document.getElementById('apiKey').value.trim();
    const businessName = document.getElementById('businessName').value.trim();
    const keywords = document.getElementById('keywords').value.trim();
    const resultadoDiv = document.getElementById('resultado');

    if (!apiKey || !businessName) {
        alert('Por favor introduce la API Key y el Nombre del Negocio.');
        return;
    }

    resultadoDiv.style.display = 'block';
    resultadoDiv.innerHTML = '<p>Consultando API de Google Places...</p>';

    try {
        const placeData = await ejecutarDiagnosticoPlaces(businessName, apiKey);
        
        if (placeData) {
            resultadoDiv.innerHTML = `
                <h3>Resultados para: ${placeData.displayName ? placeData.displayName.text : businessName}</h3>
                <div class="result-item"><span class="result-label">Dirección:</span> ${placeData.formattedAddress || 'No disponible'}</div>
                <div class="result-item"><span class="result-label">Puntuación:</span> ${placeData.rating || 'N/A'} ⭐ (${placeData.userRatingCount || 0} reseñas)</div>
                <div class="result-item"><span class="result-label">Teléfono:</span> ${placeData.nationalPhoneNumber || 'No disponible'}</div>
                <div class="result-item"><span class="result-label">Sitio Web:</span> ${placeData.websiteUri ? `<a href="${placeData.websiteUri}" target="_blank" style="color:#0ea5e9;">${placeData.websiteUri}</a>` : 'No disponible'}</div>
                <div class="result-item"><span class="result-label">Permite Reservas:</span> ${placeData.reservable ? 'Sí' : 'No / No especificado'}</div>
            `;
        }
    } catch (error) {
        resultadoDiv.innerHTML = `<p style="color: #ef4444;">Error al ejecutar el diagnóstico: ${error.message}</p>`;
    }
});

async function ejecutarDiagnosticoPlaces(nombreNegocio, apiKey) {
    const url = 'https://places.googleapis.com/v1/places:searchText';
    
    // Máscara corregida sin el parámetro problemático 'places.generatesProvisionalReservations'
    const fieldMask = [
        'places.id',
        'places.displayName',
        'places.formattedAddress',
        'places.location',
        'places.rating',
        'places.userRatingCount',
        'places.websiteUri',
        'places.nationalPhoneNumber',
        'places.regularOpeningHours',
        'places.reservable'
    ].join(',');

    const response = await fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Goog-Api-Key': apiKey,
            'X-Goog-FieldMask': fieldMask
        },
        body: JSON.stringify({
            textQuery: nombreNegocio
        })
    });

    if (!response.ok) {
        const errorData = await response.json();
        console.error('Detalle del error API Google:', errorData);
        alert('Error 400/API: Revisa la consola de desarrollador para ver el detalle.');
        return null;
    }

    const data = await response.json();

    if (!data.places || data.places.length === 0) {
        alert('No se encontró el negocio con ese nombre.');
        return null;
    }

    return data.places[0];
}
</script>

</body>
</html>
