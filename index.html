<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puliendo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:relative;
background: radial-gradient(circle at center, #111 0%, #0a0a0a 70%);
}

/* LOGO */
.logo{
width:60px;
margin-bottom:20px;
opacity:0.9;
}

/* TEXTO DINÁMICO */
.text{
font-size:26px;
font-weight:600;
max-width:300px;
line-height:1.3;
min-height:80px;
}

/* SUB */
.sub{
margin-top:15px;
font-size:14px;
opacity:0.7;
}

/* BOTÓN */
.cta{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 24px;
background:#4bb6ff;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:600;
}

/* DESKTOP */
@media(min-width:768px){

.text{
font-size:40px;
max-width:600px;
}

.logo{
width:80px;
}

}

</style>
</head>

<body>

<section class="hero">

<img src="puliendoideas_logo.svg" class="logo">

<div class="text" id="dynamicText"></div>

<div class="sub">
Soluciones digitales para negocios reales
</div>

<a href="https://wa.me/34643344106" class="cta">
Hablar por WhatsApp
</a>

</section>

<script>

const phrases = [
"Más clientes para su negocio",
"Menos caos, más control",
"Automatización sin complicaciones",
"Una presencia digital que convierte"
];

let index = 0;
const textEl = document.getElementById("dynamicText");

function showText() {
textEl.style.opacity = 0;

setTimeout(() => {
textEl.textContent = phrases[index];
textEl.style.opacity = 1;
index = (index + 1) % phrases.length;
}, 300);
}

setInterval(showText, 1400);
showText();

</script>

</body>
</html>
