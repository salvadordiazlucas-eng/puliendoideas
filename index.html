<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro V2 | Puliendo Ideas</title>
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #1e293b; --texto: #f8fafc; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar y UI */
        .sidebar { width: 450px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .preview { flex-grow: 1; background: #334155; display: flex; flex-direction: column; position: relative; }
        
        /* Selector de Dispositivo */
        .device-toggle { background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #334155; }
        .btn-device { background: #334155; border: none; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .btn-device.active { background: var(--cobalto); }

        iframe { width: 100%; height: 100%; border: none; transition: width 0.3s ease; margin: 0 auto; background: white; }
        .mobile-view { width: 375px; height: 667px; margin: 20px auto; border: 10px solid #000; border-radius: 20px; }

        .modulo-card { background: var(--pizarra); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--cobalto); position: relative; }
        .controls-pos { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-pos { background: #0f172a; border: 1px solid #334155; color: white; cursor: pointer; border-radius: 4px; padding: 2px 8px; }

        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        
        .btn-main { background: var(--cobalto); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-add { background: var(--pizarra); border: 1px dashed var(--cobalto); color: var(--cobalto); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Constructor Maestro V2</h2>
    
    <button class="btn-main btn-add" onclick="abrirSelectorModulos()">+ Añadir Nuevo Módulo</button>
    
    <div id="editorInputs">
        </div>

    <hr style="opacity: 0.1; margin: 20px 0;">
    <button class="btn-main" style="background: var(--success);" onclick="descargarHTML()">Descargar Proyecto Final</button>
</div>

<div class="preview">
    <div class="device-toggle">
        <button class="btn-device active" onclick="setDevice('pc', this)">💻 Computador</button>
        <button class="btn-device" onclick="setDevice('mobile', this)">📱 Móvil</button>
    </div>
    <iframe id="vistaPrevia"></iframe>
</div>

<div id="modalModulos" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--pizarra); padding:30px; border-radius:20px; z-index:1000; border:1px solid var(--cobalto);">
    <h3>Seleccionar Tipo de Módulo</h3>
    <select id="tipoNuevoModulo">
        <option value="hero">Hero (Imagen + Título + CTA)</option>
        <option value="servicios">Sección de Servicios (Grid)</option>
        <option value="texto">Bloque de Texto Simple</option>
    </select>
    <button class="btn-main" onclick="añadirModuloReal()">Insertar al Final</button>
    <button class="btn-main" style="background:red;" onclick="document.getElementById('modalModulos').style.display='none'">Cancelar</button>
</div>

<script>
    let modulos = [];

    // Estructura base para el responsivo
    const htmlBase = `
        <!DOCTYPE html>
        <html lang="es">
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                body { margin:0; font-family:sans-serif; overflow-x:hidden; }
                section { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
                img { max-width: 100%; height: auto; }
                .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
                @media (max-width: 768px) { section { padding: 40px 15px; } h1 { font-size: 1.8rem; } }
            </style>
        </head>
        <body id="web-body"></body>
        </html>
    `;

    function setDevice(type, btn) {
        const iframe = document.getElementById('vistaPrevia');
        document.querySelectorAll('.btn-device').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        iframe.className = (type === 'mobile') ? 'mobile-view' : '';
    }

    function abrirSelectorModulos() {
        document.getElementById('modalModulos').style.display = 'block';
    }

    function añadirModuloReal() {
        const tipo = document.getElementById('tipoNuevoModulo').value;
        const nuevo = { id: Date.now(), tipo: tipo, titulo: 'Nuevo Título', contenido: 'Descripción del módulo...', img: 'logo.png' };
        modulos.push(nuevo);
        document.getElementById('modalModulos').style.display = 'none';
        renderEditor();
    }

    function mover(index, direccion) {
        if (direccion === 'up' && index > 0) [modulos[index], modulos[index-1]] = [modulos[index-1], modulos[index]];
        if (direccion === 'down' && index < modulos.length - 1) [modulos[index], modulos[index+1]] = [modulos[index+1], modulos[index]];
        renderEditor();
    }

    function eliminar(index) {
        modulos.splice(index, 1);
        renderEditor();
    }

    function renderEditor() {
        const container = document.getElementById('editorInputs');
        container.innerHTML = '';
        let fullHtml = '';

        modulos.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'modulo-card';
            card.innerHTML = `
                <div class="controls-pos">
                    <button class="btn-pos" onclick="mover(${i}, 'up')">▲</button>
                    <button class="btn-pos" onclick="mover(${i}, 'down')">▼</button>
                    <button class="btn-pos" style="color:red;" onclick="eliminar(${i})">✕</button>
                </div>
                <h3>${m.tipo.toUpperCase()}</h3>
                <label>Título</label>
                <input type="text" value="${m.titulo}" oninput="modulos[${i}].titulo=this.value; updatePreview()">
                <label>Descripción</label>
                <textarea oninput="modulos[${i}].contenido=this.value; updatePreview()">${m.contenido}</textarea>
                <label>Imagen</label>
                <input type="text" value="${m.img}" oninput="modulos[${i}].img=this.value; updatePreview()">
            `;
            container.appendChild(card);
            
            // Construcción del HTML interno
            fullHtml += `<section id="sec-${m.id}" style="background:${i%2===0?'#fff':'#f9f9f9'}">
                <img src="${m.img}" style="max-width:200px; margin-bottom:20px;">
                <h1>${m.titulo}</h1>
                <p>${m.contenido}</p>
            </section>`;
        });

        const iframe = document.getElementById('vistaPrevia');
        iframe.srcdoc = htmlBase.replace('<body id="web-body"></body>', `<body id="web-body">${fullHtml}</body>`);
    }

    function updatePreview() { renderEditor(); }

    function descargarHTML() {
        const iframe = document.getElementById('vistaPrevia');
        const blob = new Blob([iframe.srcdoc], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'proyecto-puliendo-ideas.html';
        a.click();
    }

    // Inicio con un módulo por defecto
    añadirModuloReal();
</script>

</body>
</html>
