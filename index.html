<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puliendo Ideas | Consultoría Estratégica GMB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072ff; --bg: #020617; --card: #0f172a; --text-muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; padding: 20px; text-align: center; }
        
        .logo-container { margin-bottom: 30px; }
        .logo-app { max-width: 180px; height: auto; }

        .hero-card { background: var(--card); border: 1px solid var(--border); padding: 50px 30px; border-radius: 32px; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 32px; margin-bottom: 15px; line-height: 1.2; }
        p { color: var(--text-muted); font-size: 18px; margin-bottom: 35px; line-height: 1.5; }

        .cta-button { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            padding: 20px 40px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 16px; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }
        .cta-button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 114, 255, 0.4); }
        
        .footer-text { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Puliendo Ideas" class="logo-app">
    </div>

    <div class="hero-card">
        <h1>Impulse su Negocio en Google Maps</h1>
        <p>Deje de ser invisible. Obtenga un análisis estratégico de su presencia local y descubra cómo superar a su competencia.</p>
        
        <a href="diagnóstico.html" class="cta-button">Solicitar Diagnóstico Gratuito</a>
    </div>

    <div class="footer-text">
        © 2026 PULIENDO IDEAS - ESTRATEGIA DIGITAL LOCAL
    </div>

</body>
</html>
