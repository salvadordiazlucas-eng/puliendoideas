<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puliendo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b0f19;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
position:relative;
}

/* LOGO */
.logo{
width:300px;
margin-bottom:30px;
opacity:0.95;
}

/* TEXTO DINÁMICO */
.text{
font-size:28px;
font-weight:700;
max-width:320px;
line-height:1.3;
min-height:90px;
transition:all 0.4s ease;
}

/* SUB */
.sub{
margin-top:20px;
font-size:16px;
opacity:0.7;
max-width:400px;
}

/* BOTÓN */
.cta{
margin-top:40px;
padding:16px 28px;
background:#4da6ff;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:700;
transition:0.3s;
}

.cta:hover{
background:#6bbcff;
}

/* DESKTOP */
@media(min-width:768px){

.text{
font-size:48px;
max-width:700px;
}

.sub{
font-size:18px;
}

.logo{
width:400px;
}

}

</style>
</head>

<body>

<section class="hero">

<img src="logo.png" class="logo">

<div class="text" id="dynamicText"></div>

<div class="sub">
No lo hacemos todo.<br>
Pero lo que hacemos, lo hacemos con excelencia.
</div>

<a href="https://wa.me/34643344106" class="cta">
Quiero más clientes
</a>

</section>

<script>

const phrases = [
"Tiene una idea...",
"Pero no le está funcionando",
"Ahí es donde entramos nosotros",
"Convertimos su idea en resultados reales"
];

let index = 0;
const textEl = document.getElementById("dynamicText");

function showText() {
textEl.style.opacity = 0;

setTimeout(() => {
textEl.textContent = phrases[index];
textEl.style.opacity = 1;
index = (index + 1) % phrases.length;
}, 300);
}

setInterval(showText, 2000);
showText();

</script>

</body>
</html>
