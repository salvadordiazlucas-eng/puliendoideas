<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puliendo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b0f19;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
}

/* LOGO */
.logo{
width:260px;
margin-bottom:30px;
opacity:0.95;
}

/* TITULAR FUERTE */
.headline{
font-size:32px;
font-weight:700;
max-width:700px;
margin-bottom:15px;
}

/* TEXTO DINÁMICO */
.text{
font-size:20px;
font-weight:500;
max-width:400px;
line-height:1.4;
min-height:60px;
opacity:0.8;
}

/* SUB */
.sub{
margin-top:25px;
font-size:15px;
opacity:0.6;
max-width:420px;
}

/* BOTÓN */
.cta{
margin-top:40px;
padding:16px 30px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
border-radius:12px;
text-decoration:none;
font-weight:700;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,114,255,0.3);
}

.cta:hover{
transform:scale(1.05);
}

/* DESKTOP */
@media(min-width:768px){

.headline{
font-size:52px;
}

.text{
font-size:24px;
max-width:600px;
}

.sub{
font-size:17px;
}

.logo{
width:320px;
}

}

</style>
</head>

<body>

<section class="hero">

<img src="logo.png" class="logo">

<h1 class="headline">
Más clientes para su negocio local
</h1>

<div class="text" id="dynamicText"></div>

<div class="sub">
No lo hacemos todo.<br>
Pero lo que hacemos, lo hacemos con excelencia.
</div>

<a href="https://wa.me/34643344106" target="_blank" class="cta">
hablamos?
</a>

</section>

<script>

const phrases = [
"Su negocio puede tener más clientes",
"El problema no es su servicio",
"Es cómo aparece en internet",
"Nosotros lo convertimos en ventas"
];

let index = 0;
const textEl = document.getElementById("dynamicText");

function showText() {
textEl.style.opacity = 0;

setTimeout(() => {
textEl.textContent = phrases[index];
textEl.style.opacity = 1;
index = (index + 1) % phrases.length;
}, 300);
}

setInterval(showText, 2200);
showText();

</script>

</body>
</html>
