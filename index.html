<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puliendo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b0f19;
color:white;
scroll-behavior:smooth;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:90px 20px 80px;
position:relative;
background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
}

.logo{
width:180px;
margin-bottom:15px;
}

.headline{
font-size:28px;
max-width:320px;
}

.sub{
margin-top:15px;
font-size:14px;
opacity:0.7;
max-width:320px;
}

/* BOTÓN */
.cta{
margin-top:30px;
padding:16px;
background:#0072ff;
border-radius:12px;
color:white;
text-decoration:none;
font-weight:700;
width:100%;
max-width:280px;
}

/* INDICADOR SCROLL */
.scroll-indicator{
position:absolute;
bottom:20px;
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;
opacity:0.7;
animation:fadeIn 2s ease forwards;
}

.scroll-indicator span{
margin-bottom:5px;
}

.arrow{
font-size:20px;
animation:bounce 1.5s infinite;
}

/* ANIMACIONES */
@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(8px);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:0.7;}
}

/* SECCIONES */
section{
padding:60px 20px;
text-align:center;
}

h2{
font-size:24px;
max-width:320px;
margin:0 auto 30px;
}

.grid{
display:flex;
flex-direction:column;
gap:15px;
max-width:320px;
margin:0 auto;
}

.box{
background:#020617;
padding:18px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<img src="logo.png" class="logo">

<h1 class="headline">
Más clientes para su negocio local
</h1>

<div class="sub">
No hacemos todo.<br>
Pero buscamos la excelencia en todo lo que hacemos.
</div>

<a href="https://wa.me/34643344106" class="cta">
¿Hablamos?
</a>

<!-- INDICADOR -->
<div class="scroll-indicator">
<span>Desliza para ver más información</span>
<div class="arrow">↓</div>
</div>

</section>

<!-- SIGUIENTE BLOQUE (EJEMPLO) -->
<section>
<h2>Si su negocio no está creciendo, no es casualidad</h2>
<div class="grid">
<div class="box">No aparece en Google</div>
<div class="box">No tiene reseñas suficientes</div>
<div class="box">Las redes no le generan clientes</div>
</div>
</section>

</body>
</html>
