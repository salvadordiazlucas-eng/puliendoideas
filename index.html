<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2">
    <title>Puliendo Ideas | Estrategia e IA para Negocios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072ff; --bg: #0b0f19; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; }

        /* HERO - ALTURA TOTAL */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
        }

        .logo-img { width: 100%; max-width: 240px; height: auto; margin-bottom: 40px; }
        .headline { font-size: clamp(26px, 7vw, 48px); font-weight: 700; margin-bottom: 16px; }
        .sub { font-size: 16px; color: var(--text-muted); max-width: 500px; margin-bottom: 30px; }

        /* BOTÓN AZUL */
        .cta-btn {
            display: inline-block;
            width: 100%;
            max-width: 300px;
            padding: 18px;
            background: var(--primary);
            color: white !important;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.3);
            margin-bottom: 50px; /* Espacio para que la flecha no lo pise */
        }

        /* FLECHA - POSICIÓN CORREGIDA AL FINAL */
        .scroll-indicator {
            position: absolute;
            bottom: 30px; /* Siempre al borde inferior de la pantalla */
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
        }

        /* WHATSAPP FLOAT */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            z-index: 999;
        }
        .whatsapp-float img { width: 100%; height: auto; }
    </style>
</head>
<body>

    <section class="hero">
        <img src="logo.png" alt="Puliendo Ideas" class="logo-img">
        <h1 class="headline">Estrategia real para su negocio local</h1>
        <p class="sub">Optimizamos su presencia en Google y automatizamos procesos.</p>
        <a href="https://wa.me/34643344106" class="cta-btn">Solicitar Diagnóstico</a>

        <div class="scroll-indicator">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"></path>
            </svg>
        </div>
    </section>

    <a href="https://wa.me/34643344106" class="whatsapp-float">
        <img src="WhatsApp.png" alt="WhatsApp">
    </a>

</body>
</html>
