<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puliendo Ideas | Dando luz a sus ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#050505;
color:white;
overflow:hidden;
}

/* FONDO */
.background{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
z-index:-2;
}

/* LUZ PRINCIPAL */
.light{
position:absolute;
width:120px;
height:120px;
background:radial-gradient(circle, rgba(255,220,100,0.9), rgba(255,220,100,0.1));
border-radius:50%;
top:40%;
left:50%;
transform:translate(-50%,-50%);
animation:float 6s ease-in-out infinite;
filter:blur(2px);
}

/* AURA */
.glow{
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle, rgba(255,220,100,0.15), transparent 70%);
top:40%;
left:50%;
transform:translate(-50%,-50%);
animation:float 6s ease-in-out infinite;
filter:blur(40px);
}

/* ANIMACIÓN */
@keyframes float{
0%{transform:translate(-50%,-50%) translateY(0);}
50%{transform:translate(-50%,-50%) translateY(-20px);}
100%{transform:translate(-50%,-50%) translateY(0);}
}

/* CONTENIDO */
.container{
position:relative;
text-align:center;
top:50%;
transform:translateY(-50%);
padding:20px;
}

h1{
font-size:64px;
color:#4bb6ff;
margin-bottom:10px;
}

.subtitle{
font-size:22px;
opacity:0.8;
margin-bottom:30px;
}

.description{
max-width:700px;
margin:auto;
line-height:1.6;
font-size:18px;
opacity:0.85;
}

.button{
display:inline-block;
margin-top:40px;
padding:14px 30px;
background:#4bb6ff;
color:black;
border-radius:10px;
font-weight:600;
text-decoration:none;
transition:0.3s;
}

.button:hover{
transform:scale(1.05);
}

.contact{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="glow"></div>
<div class="light"></div>

<div class="container">

<h1>Puliendo Ideas</h1>
<p class="subtitle">Dando luz a sus ideas</p>

<p class="description">
No estamos creando una web.  
Estamos construyendo un sistema para transformar ideas en soluciones reales.
</p>

<a class="button" href="mailto:info@puliendoideas.com">Contactar</a>

<div class="contact">
<p>+34 643 34 41 06</p>
<p>info@puliendoideas.com</p>
</div>

</div>

</body>
</html>
