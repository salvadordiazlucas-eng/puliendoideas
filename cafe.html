<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Diagnóstico Automatizado</title>
    <style>
        body { font-family: "Segoe UI", system-ui, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 600px; width: 100%; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        .btn-option { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; text-align: left; font-size: 16px; transition: all 0.2s; box-sizing: border-box; }
        .btn-option:hover { background: #0284c7; transform: translateX(5px); }
        .resultado-pan { background: #0284c7; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 15px; border-left: 5px solid #bae6fd; }
        .btn-restart { background: #ef4444; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        .btn-restart:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="card" id="quiz-container">
        <h2 id="pregunta-texto">Cargando diagnóstico...</h2>
        <div id="opciones-contenedor"></div>
    </div>

    <script>
        // === ARBOL DE DECISIÓN GENERADO ===
        const arbol = {
    "inicio": {
        "pregunta": "te gusta el cafe",
        "respuestas": [
            {
                "texto": "no",
                "salto": "final",
                "pan": "te lo pierdes"
            },
            {
                "texto": "si, me encanta",
                "salto": "final",
                "pan": "genial super bien"
            }
        ]
    }
};
        // ==================================

        let historial = [];

        function mostrarRama(id) {
            const contenedorOpciones = document.getElementById("opciones-contenedor");
            const textoPregunta = document.getElementById("pregunta-texto");
            contenedorOpciones.innerHTML = "";

            if (id === "final" || !arbol[id]) {
                textoPregunta.innerText = "¡Diagnóstico Concluido!";
                if (historial.length > 0) {
                    let htmlResumen = "<h3>Recomendaciones del Plan de Acción (PAN):</h3>";
                    historial.forEach(item => {
                        if(item.pan) htmlResumen += '<div class="resultado-pan">' + item.pan + '</div>';
                    });
                    contenedorOpciones.innerHTML = htmlResumen;
                }
                contenedorOpciones.innerHTML += '<button class="btn-restart" onclick="reiniciar()">Iniciar Nuevo Diagnóstico</button>';
                return;
            }

            const nodoActual = arbol[id];
            textoPregunta.innerText = nodoActual.pregunta;

            nodoActual.respuestas.forEach(resp => {
                const boton = document.createElement("button");
                boton.className = "btn-option";
                boton.innerText = resp.texto;
                boton.onclick = () => {
                    if(resp.pan) historial.push({ pregunta: nodoActual.pregunta, respuesta: resp.texto, pan: resp.pan });
                    mostrarRama(resp.salto);
                };
                contenedorOpciones.appendChild(boton);
            });
        }

        function reiniciar() {
            historial = [];
            mostrarRama("inicio");
        }

        window.onload = () => mostrarRama("inicio");
    </script>
</body>
</html>
