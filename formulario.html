<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto | Puliendo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b0f19;
color:white;
padding:20px;
}

.container{
max-width:400px;
margin:0 auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input, select, textarea{
padding:14px;
border-radius:10px;
border:none;
background:#020617;
color:white;
font-size:14px;
}

textarea{
min-height:120px;
resize:none;
}

button{
margin-top:10px;
padding:16px;
border:none;
border-radius:12px;
background:#0072ff;
color:white;
font-weight:700;
font-size:16px;
}

.nota{
margin-top:20px;
font-size:12px;
opacity:0.6;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Cuéntenos su caso</h1>

<form>

<input type="text" placeholder="Nombre" required>

<input type="text" placeholder="Población">

<input type="text" placeholder="Provincia">

<input type="text" placeholder="País">

<input type="email" placeholder="Email" required>

<input type="tel" placeholder="Teléfono de contacto">

<select>
<option>¿Cómo prefiere que le contactemos?</option>
<option>Teléfono</option>
<option>Email</option>
<option>WhatsApp</option>
</select>

<textarea placeholder="¿Qué desea contarnos?"></textarea>

<button type="submit">Enviar</button>

</form>

<div class="nota">
Le responderemos en un plazo máximo de 24 horas
</div>

</div>

</body>
</html>
