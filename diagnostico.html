<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Diagnóstico Estratégico | Puliendo Ideas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072ff; --bg: #020617; --card: #0f172a; --text-muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        #diag-container { background: var(--card); border: 1px solid var(--border); width: 90%; max-width: 500px; padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .pan-mensaje { color: var(--primary); font-weight: 600; font-size: 14px; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-size: 24px; margin: 0 0 30px 0; line-height: 1.3; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; cursor: pointer; text-align: left; transition: all 0.3s ease; font-size: 16px; }
        .opt-btn:hover { background: rgba(0,114,255,0.1); border-color: var(--primary); transform: translateX(5px); }
        .final-form { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: white; box-sizing: border-box; }
        .cta-send { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="diag-container">
    <div id="quiz-flow">
        <span id="pan-feedback" class="pan-mensaje">Iniciando análisis...</span>
        <h2 id="pregunta-texto">Cargando diagnóstico...</h2>
        <div id="opciones-container" class="options-grid"></div>
    </div>

    <div id="final-step" class="final-form">
        <span class="pan-mensaje">Diagnóstico Completado</span>
        <h2>Cierre el círculo y recupere el control</h2>
        <input type="text" id="nombreNegocio" placeholder="Nombre de su negocio">
        <input type="tel" id="telefonoNegocio" placeholder="Su WhatsApp">
        <button class="cta-send" onclick="enviarDiagnostico()">Enviar informe a Salvador</button>
    </div>
</div>

<script>
    // --- ESTA ES TU HERRAMIENTA DE EDICIÓN ---
    // Aquí puedes añadir, quitar o cambiar todo a tu antojo.
    const arbol = {
        "inicio": {
            "pregunta": "¿Su negocio ya existe en Google Maps?",
            "respuestas": [
                { "texto": "Sí, ya aparece", "salto": "gestion", "pan": "¡Genial! Tienes la base ganada." },
                { "texto": "No, es una nueva apertura", "salto": "final", "pan": "Perfecto, nacerás con ventaja." }
            ]
        },
        "gestion": {
            "pregunta": "¿Es usted quien gestiona el contenido personalmente?",
            "respuestas": [
                { "texto": "Sí, yo mismo", "salto": "claves", "pan": "El compromiso es el primer paso." },
                { "texto": "No, lo lleva un tercero", "salto": "final", "pan": "Delegar es sabio, optimizar es necesario." }
            ]
        },
        "claves": {
            "pregunta": "¿Tiene usted las claves de acceso al perfil?",
            "respuestas": [
                { "texto": "Sí, tengo acceso total", "salto": "final", "pan": "Tienes las llaves, falta el motor." },
                { "texto": "No tengo las claves", "salto": "final", "pan": "Tranquilo, recuperarlas es nuestra especialidad." }
            ]
        }
    };

    let estadoActual = "inicio";
    let informe = "";

    function renderizar() {
        const nodo = arbol[estadoActual];
        if (!nodo || estadoActual === "final") {
            document.getElementById('quiz-flow').style.display = 'none';
            document.getElementById('final-step').style.display = 'block';
            return;
        }

        document.getElementById('pregunta-texto').innerText = nodo.pregunta;
        const contenedor = document.getElementById('opciones-container');
        contenedor.innerHTML = "";

        nodo.respuestas.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.texto;
            btn.onclick = () => {
                informe += `${nodo.pregunta}: ${opt.texto} | `;
                document.getElementById('pan-feedback').innerText = opt.pan;
                estadoActual = opt.salto;
                renderizar();
            };
            contenedor.appendChild(btn);
        });
    }

    function enviarDiagnostico() {
        const nombre = document.getElementById('nombreNegocio').value;
        const tel = document.getElementById('telefonoNegocio').value;
        const msg = `Hola Salvador, Diagnóstico completado:\n\n${informe}\nNegocio: ${nombre}\nTel: ${tel}`;
        window.location.href = `https://wa.me/34643344106?text=${encodeURIComponent(msg)}`;
    }

    renderizar();
</script>

</body>
</html>
