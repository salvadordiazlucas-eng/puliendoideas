<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Estratégico | Experto en Google Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072ff; --bg: #020617; --card: #0f172a; --text-muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #diag-container { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 550px; padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .pan-mensaje { color: var(--primary); font-weight: 600; font-size: 14px; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; min-height: 20px; }
        h2 { font-size: 24px; margin: 0 0 25px 0; line-height: 1.3; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; cursor: pointer; text-align: left; transition: all 0.3s ease; font-size: 16px; width: 100%; }
        .opt-btn:hover { background: rgba(0,114,255,0.1); border-color: var(--primary); transform: translateX(5px); }
        .final-form { display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; margin-left: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: white; box-sizing: border-box; font-size: 15px; }
        .cta-send { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="diag-container">
    <div id="quiz-flow">
        <span id="pan-feedback" class="pan-mensaje">Iniciando análisis...</span>
        <h2 id="pregunta-texto">Cargando diagnóstico...</h2>
        <div id="opciones-container" class="options-grid"></div>
    </div>

    <div id="final-step" class="final-form">
        <span class="pan-mensaje">Análisis finalizado con éxito</span>
        <h2>Reciba su Hoja de Ruta</h2>
        <div class="form-group"><label>Nombre del Comercio</label><input type="text" id="nombreNegocio" placeholder="Ej: Fogonxito"></div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Población</label><input type="text" id="poblacion" placeholder="Ej: Madrid"></div>
            <div><label>Contacto</label><input type="text" id="contacto" placeholder="Su nombre"></div>
        </div>
        <div class="form-group"><label>Correo Electrónico</label><input type="email" id="emailCliente" placeholder="email@ejemplo.com"></div>
        <div class="form-group"><label>WhatsApp</label><input type="tel" id="telefonoNegocio" placeholder="+34 000 000 000"></div>
        <div class="form-group">
            <label>Preferencia de contacto</label>
            <select id="preferencia"><option value="WhatsApp">WhatsApp</option><option value="Email">Email</option></select>
        </div>
        <button class="cta-send" id="submit-btn" onclick="enviarInformeInvisible()">Enviar informe al Experto</button>
    </div>
</div>

<script>
    const arbol = {
    "inicio": {
        "pregunta": "¿Su negocio ya aparece en Google Maps?",
        "respuestas": [
            {
                "texto": "Sí, ya aparece",
                "salto": "autoridad_si",
                "pan": "Excelente base de partida."
            },
            {
                "texto": "No aparece o es apertura",
                "salto": "autoridad_no",
                "pan": "Momento ideal para el éxito."
            }
        ]
    },
    "": {
        "pregunta": "¿En que rango de edad se mueven sus clientes?",
        "respuestas": [
            {
                "texto": "De 18 a 30 años",
                "salto": "autoridad_si",
                "pan": "Genial, esas edades son insaciables"
            },
            {
                "texto": "De 31 en adelante",
                "salto": "autoridad_no",
                "pan": "Genail, esas edades saben lo que quieren.."
            }
        ]
    }
};

    let estadoActual = "inicio";
    let informeTexto = "";

    function renderizar() {
        const nodo = arbol[estadoActual];
        if (!nodo || estadoActual === "final") {
            document.getElementById('quiz-flow').style.display = 'none';
            document.getElementById('final-step').style.display = 'block';
            return;
        }
        document.getElementById('pregunta-texto').innerText = nodo.pregunta;
        const contenedor = document.getElementById('opciones-container');
        contenedor.innerHTML = "";
        nodo.respuestas.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.texto;
            btn.onclick = () => {
                informeTexto += `${nodo.pregunta}: ${opt.texto} | `;
                document.getElementById('pan-feedback').innerText = opt.pan;
                estadoActual = opt.salto;
                renderizar();
            };
            contenedor.appendChild(btn);
        });
    }

    async function enviarInformeInvisible() {
        const btn = document.getElementById('submit-btn');
        const datos = {
            negocio: document.getElementById('nombreNegocio').value,
            poblacion: document.getElementById('poblacion').value,
            contacto: document.getElementById('contacto').value,
            email: document.getElementById('emailCliente').value,
            tel: document.getElementById('telefonoNegocio').value,
            preferencia: document.getElementById('preferencia').value,
            diagnostico: informeTexto
        };

        if(!datos.negocio || !datos.email || !datos.tel) {
            alert("Por favor, rellene los campos obligatorios.");
            return;
        }

        btn.innerText = "ENVIANDO INFORME...";
        btn.disabled = true;

        try {
            // USANDO TU ID: xqewzpbr
            const response = await fetch('https://formspree.io/f/xqewzpbr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                alert("¡Informe enviado con éxito! El experto analizará su caso y le contactará en breve.");
                window.location.reload(); 
            } else { throw new Error(); }
        } catch {
            alert("Error al enviar. Inténtelo de nuevo o contacte directamente.");
            btn.innerText = "Enviar informe al Experto";
            btn.disabled = false;
        }
    }
    renderizar();
</script>
</body>
</html>
