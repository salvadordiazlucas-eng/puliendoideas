<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Estratégico | Experto en Google Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072ff; --bg: #020617; --card: #0f172a; --text-muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        #diag-container { background: var(--card); border: 1px solid var(--border); width: 100%; max-width: 500px; padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .pan-mensaje { color: var(--primary); font-weight: 600; font-size: 14px; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; min-height: 20px; }
        h2 { font-size: 24px; margin: 0 0 30px 0; line-height: 1.3; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; cursor: pointer; text-align: left; transition: all 0.3s ease; font-size: 16px; width: 100%; }
        .opt-btn:hover { background: rgba(0,114,255,0.1); border-color: var(--primary); transform: translateX(5px); }
        .final-form { display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: white; box-sizing: border-box; font-size: 16px; }
        .cta-send { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: opacity 0.3s; }
        .cta-send:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="diag-container">
    <div id="quiz-flow">
        <span id="pan-feedback" class="pan-mensaje">Iniciando análisis...</span>
        <h2 id="pregunta-texto">Cargando diagnóstico...</h2>
        <div id="opciones-container" class="options-grid"></div>
    </div>

    <div id="final-step" class="final-form">
        <span class="pan-mensaje">Diagnóstico Completado</span>
        <h2>Reciba su hoja de ruta personalizada</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Introduzca los datos de su negocio para que el experto analice su caso.</p>
        <input type="text" id="nombreNegocio" placeholder="Nombre de su negocio">
        <input type="tel" id="telefonoNegocio" placeholder="Su WhatsApp">
        <button class="cta-send" onclick="enviarDiagnostico()">Ver mi informe y hablar con el experto</button>
    </div>
</div>

<script>
    // ARQUITECTURA DINÁMICA DEL ÁRBOL
    const arbol = {
        "inicio": {
            "pregunta": "¿Su negocio ya existe en Google Maps?",
            "respuestas": [
                { "texto": "Sí, ya aparece", "salto": "autoridad_si", "pan": "¡Genial! Ya tienes la base ganada." },
                { "texto": "No, es una nueva apertura o nunca se registró", "salto": "autoridad_no", "pan": "Perfecto, nacerás con ventaja estratégica." }
            ]
        },
        "autoridad_si": {
            "pregunta": "¿Es usted quien gestiona el contenido actualmente?",
            "respuestas": [
                { "texto": "Sí, yo mismo lo hago todo", "salto": "claves_acceso", "pan": "El compromiso es el primer paso." },
                { "texto": "No, lo lleva un tercero (hijo, empleado, agencia)", "salto": "claves_acceso", "pan": "Delegar es sabio, optimizar es necesario." }
            ]
        },
        "autoridad_no": {
            "pregunta": "¿Es usted el propietario o quien tomará las decisiones del negocio?",
            "respuestas": [
                { "texto": "Sí, soy el propietario", "salto": "final", "pan": "La visión clara es la clave del éxito." },
                { "texto": "No, estoy ayudando al propietario", "salto": "final", "pan": "Un buen apoyo es fundamental para crecer." }
            ]
        },
        "claves_acceso": {
            "pregunta": "¿Tiene usted las claves de acceso al perfil?",
            "respuestas": [
                { "texto": "Sí, tengo acceso total", "salto": "final", "pan": "Tienes las llaves, ahora pongamos el motor a punto." },
                { "texto": "No tengo las claves o las tiene otro", "salto": "final", "pan": "Recuperar el control es nuestra prioridad." }
            ]
        }
    };

    let estadoActual = "inicio";
    let informe = "";

    function renderizar() {
        const nodo = arbol[estadoActual];
        if (!nodo || estadoActual === "final") {
            document.getElementById('quiz-flow').style.display = 'none';
            document.getElementById('final-step').style.display = 'block';
            return;
        }

        document.getElementById('pregunta-texto').innerText = nodo.pregunta;
        const contenedor = document.getElementById('opciones-container');
        contenedor.innerHTML = "";

        nodo.respuestas.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.texto;
            btn.onclick = () => {
                informe += `\n- ${nodo.pregunta}: ${opt.texto}`;
                document.getElementById('pan-feedback').innerText = opt.pan;
                estadoActual = opt.salto;
                renderizar();
            };
            contenedor.appendChild(btn);
        });
    }

    function enviarDiagnostico() {
        const nombre = document.getElementById('nombreNegocio').value;
        const tel = document.getElementById('telefonoNegocio').value;
        
        if(!nombre || !tel) {
            alert("Por favor, rellene los datos para recibir su informe.");
            return;
        }

        const msg = `Hola Salvador, he completado el diagnóstico para mi negocio:\n${informe}\n\n*Datos de contacto:*\nNegocio: ${nombre}\nWhatsApp: ${tel}`;
        // Tu número de WhatsApp con el código de país
        window.location.href = `https://wa.me/34643344106?text=${encodeURIComponent(msg)}`;
    }

    renderizar();
</script>

</body>
</html>
