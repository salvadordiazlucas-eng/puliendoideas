<script>
async function runAudit() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const businessName = document.getElementById('businessName').value.trim();
    const keywordsInput = document.getElementById('keywords').value.trim();

    if(!apiKey || !businessName || !keywordsInput) {
        alert("Por favor, rellena todos los campos.");
        return;
    }

    const keywordList = keywordsInput.split(',').map(k => k.trim());
    const mainKeyword = keywordList[0];

    document.getElementById('results').style.display = 'block';
    document.getElementById('scoreValue').innerText = "...";

    try {
        // 1. Datos del Cliente (Máscara limpia y corregida sin campos inválidos)
        const clientRes = await fetch(`https://places.googleapis.com/v1/places:searchText`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': apiKey,
                'X-Goog-FieldMask': 'places.displayName,places.rating,places.userRatingCount,places.websiteUri,places.nationalPhoneNumber,places.reservable'
            },
            body: JSON.stringify({ textQuery: businessName })
        });
        
        const clientData = await clientRes.json();
        
        if (clientData.error) {
            alert(`Error de Google API (${clientData.error.code}): ${clientData.error.message}`);
            console.error("Detalle completo:", clientData.error);
            return;
        }

        const client = (clientData.places && clientData.places.length > 0) ? clientData.places[0] : null;

        if(!client) {
            alert("No se encontró el negocio con ese nombre.");
            return;
        }

        // 2. Mercado Local
        const compRes = await fetch(`https://places.googleapis.com/v1/places:searchText`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': apiKey,
                'X-Goog-FieldMask': 'places.displayName,places.rating,places.userRatingCount'
            },
            body: JSON.stringify({ textQuery: mainKeyword, pageSize: 5 })
        });
        const compData = await compRes.json();
        const competitors = compData.places || [];

        document.getElementById('reportBusinessName').innerText = client.displayName ? client.displayName.text : businessName;
        document.getElementById('reportKeywords').innerText = `Analizando: ${keywordList.join(" | ")}`;

        let score = 100;
        let repHTML = '';
        let convHTML = '';
        let planHTML = '';

        // --- REPUTACIÓN Y ENGAGEMENT ---
        const clientRating = client.rating || 0;
        const clientReviews = client.userRatingCount || 0;

        repHTML += `
            <div class="audit-detail success">
                <h4>✅ Sólida base de clientes acumulada</h4>
                <p>Tu negocio cuenta con <strong>${clientReviews} opiniones de clientes</strong> y una valoración de <strong>${clientRating}★</strong>. Tienes una comunidad de clientes satisfechos que ya respaldan la calidad de tu establecimiento.</p>
            </div>
        `;

        repHTML += `
            <div class="audit-detail warning">
                <h4>📈 Oportunidad de Fidelización: Gestión Activa de Opiniones</h4>
                <p>Responder a las opiniones de los usuarios fortalece la cercanía con el cliente. Según los estándares de Google, las fichas con interacción activa por parte de la gerencia consiguen mayor alcance orgánico en las búsquedas locales.</p>
            </div>
        `;
        planHTML += `<li><strong>Protocolo de Atención en Reseñas:</strong> Establecer una rutina de respuesta sistemática para proyectar atención al cliente y potenciar la visibilidad en el algoritmo local.</li>`;

        // --- RESERVAS Y CONVERSIÓN ---
        if (client.reservable) {
            convHTML += `
                <div class="audit-detail success">
                    <h4>✅ Canal de Reserva Directa Activo</h4>
                    <p>La ficha cuenta con opción de gestión de reservas, lo que facilita la conversión inmediata cuando un cliente decide acudir a tu establecimiento.</p>
                </div>
            `;
        } else {
            score -= 15;
            convHTML += `
                <div class="audit-detail warning">
                    <h4>💡 Potencial Dormido: Automatización de Reservas y Turnos</h4>
                    <p>Actualmente la ficha no dispone de un botón directo de reserva en línea habilitado. Integrar un motor de reservas instantáneo permite captar clientes fuera del horario comercial, reducir la pérdida de llamadas no atendidas en horas punta y optimizar la rotación de mesas por turnos de disponibilidad.</p>
                </div>
            `;
            planHTML += `<li><strong>Sistema de Reserva Directa:</strong> Habilitar la confirmación instantánea de mesas en la ficha de Google para maximizar la ocupación del comedor y aumentar la facturación mensual.</li>`;
        }

        if (client.websiteUri) {
            convHTML += `
                <div class="audit-detail success">
                    <h4>✅ Acceso Digital a Carta y Menú</h4>
                    <p>Enlace corporativo correctamente configurado (<code>${client.websiteUri}</code>), permitiendo al cliente consultar la propuesta gastronómica previa.</p>
                </div>
            `;
        } else {
            score -= 15;
            convHTML += `
                <div class="audit-detail warning">
                    <h4>💡 Oportunidad: Carta Digital y Menú Interactivo</h4>
                    <p>Vincular un sitio web optimizado para móviles o la carta digitalizada directamente en el perfil ayuda a que el usuario tome la decisión de visita de forma mucho más rápida.</p>
                </div>
            `;
            planHTML += `<li><strong>Despliegue de Carta Interactiva:</strong> Vincular una página de destino adaptada a dispositivos móviles con el menú completo y llamadas a la acción claras.</li>`;
        }

        // --- TABLA DE COMPETENCIA ---
        let compHTML = '';
        let totalCompReviews = 0;
        competitors.forEach((c, index) => {
            const compName = c.displayName ? c.displayName.text : 'Negocio Local';
            const isClient = compName.toLowerCase().includes((client.displayName ? client.displayName.text : businessName).toLowerCase());
            totalCompReviews += (c.userRatingCount || 0);
            compHTML += `
                <tr class="${isClient ? 'is-client' : ''}">
                    <td>#${index + 1}</td>
                    <td>${compName} ${isClient ? '(TU ESTABLECIMIENTO)' : ''}</td>
                    <td>${c.rating || 'N/A'} ★</td>
                    <td>${c.userRatingCount || 0} opiniones</td>
                </tr>
            `;
        });
        document.getElementById('compBody').innerHTML = compHTML;

        // Estímulo de Demanda Estimada
        document.getElementById('demandEstimation').innerHTML = `
            <div class="audit-detail warning">
                <h4>📊 Estimación de Demanda y Potencial de Conversión en la Zona</h4>
                <p>Los principales negocios del sector en tu área acumulan un volumen conjunto de <strong>+${totalCompReviews} opiniones registradas</strong> en Google. Se estima que hasta un <strong>20% de los usuarios</strong> que consultan estas fichas buscan realizar una reserva o consulta inmediata. Contar con canales directos de reserva automatizados permite capturar esa demanda activa sin perder clientes en el proceso de decisión.</p>
            </div>
        `;

        // Pintar Resultados
        document.getElementById('reputationAudit').innerHTML = repHTML;
        document.getElementById('conversionAudit').innerHTML = convHTML;
        document.getElementById('actionPlanList').innerHTML = planHTML;
        document.getElementById('scoreValue').innerText = `${Math.max(score, 60)}/100`;

    } catch (e) {
        alert("Ocurrió un error inesperado al procesar la solicitud.");
        console.error("Error catch:", e);
    }
}
</script>
