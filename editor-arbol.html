<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro con Mapa Visual | Salvador Díaz</title>
    <style>
        :root { --primary: #0072ff; --bg: #f8f9fa; --text: #2d3436; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 30px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { color: var(--primary); display: flex; align-items: center; gap: 10px; }
        textarea { width: 100%; height: 100px; font-family: monospace; background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 8px; font-size: 11px; }
        .node-box { background: #f1f2f6; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--primary); }
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin-top: 10px; }
        .option-card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #dee2e6; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 18px; padding: 20px; margin-top: 20px; }
        .badge { background: #636e72; color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: block; margin: 5px 0; width: fit-content; }
        
        /* ESTILOS DEL MAPA VISUAL */
        #mapa-visual { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; padding: 20px; background: #fff; border-radius: 12px; border: 2px dashed #ccc; }
        .mapa-nodo { border: 2px solid var(--primary); padding: 10px; border-radius: 8px; background: #eef6ff; font-size: 12px; min-width: 150px; }
        .flecha { color: #636e72; font-weight: bold; }
        .destino-final { border-color: var(--success); background: #e8f5e9; }
        input { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Constructor Maestro + Mapa Visual</h1>
        <p>1. Pega aquí tu código de GitHub (diagnostico.html):</p>
        <textarea id="html-base" placeholder="Pega el código completo aquí..."></textarea>
    </div>

    <div class="card">
        <h2>2. Estructura de Ramas</h2>
        <div id="editor-ramas">
            <div class="node-box" data-id="inicio">
                <strong>ID: inicio</strong>
                <input type="text" class="q-text" value="¿Su negocio ya aparece en Google Maps?">
                <div class="grid-options" id="opts-inicio">
                    <div class="option-card">
                        <label class="badge">RESPUESTA</label><input type="text" class="opt-text" value="Sí">
                        <label class="badge">SALTO A</label><input type="text" class="opt-jump" value="autoridad_si" oninput="dibujarMapa()">
                    </div>
                    <div class="option-card">
                        <label class="badge">RESPUESTA</label><input type="text" class="opt-text" value="No">
                        <label class="badge">SALTO A</label><input type="text" class="opt-jump" value="final" oninput="dibujarMapa()">
                    </div>
                </div>
            </div>
        </div>
        <button class="btn" style="background:#2d3436; color:white;" onclick="agregarRama()">+ Añadir Nueva Pregunta</button>
    </div>

    <div class="card">
        <h2>3. Mapa de Flujo (Vista Previa Visual)</h2>
        <p style="font-size:12px; color:666;">Este mapa se actualiza solo para que veas el camino que seguirá el cliente.</p>
        <div id="mapa-visual"></div>
    </div>

    <button class="btn btn-main" onclick="ensamblarYGenerar()">4. GENERAR CÓDIGO FINAL</button>

    <div id="resultado-container" class="card" style="display:none;">
        <h2>Código para GitHub</h2>
        <textarea id="codigo-final" style="height: 300px; background: #1e1e1e;"></textarea>
    </div>
</div>

<script>
    function agregarRama() {
        const ramaId = 'rama_' + Date.now();
        const div = document.createElement('div');
        div.className = 'node-box';
        div.innerHTML = `
            <strong>ID Rama:</strong> <input type="text" class="rama-id-input" placeholder="Nombre de la parada" style="width:150px" oninput="dibujarMapa()">
            <input type="text" class="q-text" placeholder="Escribe la pregunta..." style="margin-top:10px">
            <div class="grid-options" id="opts-${ramaId}">
                <div class="option-card">
                    <label class="badge">RESPUESTA</label><input type="text" class="opt-text">
                    <label class="badge">SALTO A</label><input type="text" class="opt-jump" placeholder="ej: final" oninput="dibujarMapa()">
                </div>
            </div>
            <button class="btn" style="font-size:11px; margin-top:10px; background:#2ecc71; color:white" onclick="agregarOpcion('${ramaId}')">+ Opción</button>
        `;
        document.getElementById('editor-ramas').appendChild(div);
        dibujarMapa();
    }

    function agregarOpcion(ramaId) {
        const container = document.getElementById('opts-' + ramaId);
        const div = document.createElement('div');
        div.className = 'option-card';
        div.innerHTML = `
            <label class="badge">RESPUESTA</label><input type="text" class="opt-text">
            <label class="badge">SALTO A</label><input type="text" class="opt-jump" oninput="dibujarMapa()">`;
        container.appendChild(div);
        dibujarMapa();
    }

    function dibujarMapa() {
        const mapa = document.getElementById('mapa-visual');
        mapa.innerHTML = "";
        
        document.querySelectorAll('.node-box').forEach(box => {
            const id = box.dataset.id || box.querySelector('.rama-id-input').value || "?";
            const nodoDiv = document.createElement('div');
            nodoDiv.className = 'mapa-nodo';
            let contenido = `<strong>${id.toUpperCase()}</strong><br>`;
            
            box.querySelectorAll('.opt-jump').forEach(jump => {
                const destino = jump.value || "...";
                const estiloDestino = destino === "final" ? "color:green; font-weight:bold;" : "";
                contenido += `<span class="flecha"> → </span> <span style="${estiloDestino}">${destino}</span><br>`;
            });
            
            nodoDiv.innerHTML = contenido;
            mapa.appendChild(nodoDiv);
        });
    }

    function ensamblarYGenerar() {
        const htmlBase = document.getElementById('html-base').value;
        const ramas = {};
        document.querySelectorAll('.node-box').forEach(box => {
            let id = box.dataset.id || box.querySelector('.rama-id-input').value;
            if(!id) return;
            const opciones = [];
            box.querySelectorAll('.option-card').forEach(opt => {
                opciones.push({
                    "texto": opt.querySelector('.opt-text').value,
                    "salto": opt.querySelector('.opt-jump').value,
                    "pan": "Análisis en curso..." // PAN por defecto si no se edita
                });
            });
            ramas[id] = { "pregunta": box.querySelector('.q-text').value, "respuestas": opciones };
        });

        const nuevoArbolJs = "const arbol = " + JSON.stringify(ramas, null, 4) + ";";
        const htmlFinal = htmlBase.replace(/const arbol = \{[\s\S]*?\};/, nuevoArbolJs);
        document.getElementById('codigo-final').value = htmlFinal;
        document.getElementById('resultado-container').style.display = 'block';
    }

    // Dibujar el mapa inicial
    dibujarMapa();
</script>
</body>
</html>
