<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro Inteligente | Salvador Díaz</title>
    <style>
        :root { --primary: #0072ff; --bg: #f8f9fa; --text: #2d3436; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 30px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0 0 10px 0; }
        textarea { width: 100%; height: 100px; font-family: monospace; background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 8px; font-size: 11px; }
        .node-box { background: #f1f2f6; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--primary); position: relative; }
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin-top: 10px; }
        .option-card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #dee2e6; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 18px; padding: 20px; margin-top: 20px; }
        .badge { background: #636e72; color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: block; margin: 5px 0; width: fit-content; }
        #mapa-visual { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; padding: 20px; background: #fff; border-radius: 12px; border: 2px dashed #ccc; }
        .mapa-nodo { border: 2px solid var(--primary); padding: 10px; border-radius: 8px; background: #eef6ff; font-size: 11px; min-width: 140px; }
        input { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-del { position: absolute; top: 10px; right: 10px; background: #ff7675; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>1. Cargar Proyecto Actual</h1>
        <p>Pega aquí el código de <b>diagnóstico.html</b> y el sistema reconstruirá el mapa automáticamente:</p>
        <textarea id="html-base" placeholder="Pega el código completo aquí..." oninput="cargarArbolDesdeCodigo()"></textarea>
    </div>

    <div class="card">
        <h1>2. Estructura y Mapa Visual</h1>
        <div id="mapa-visual">
            <p style="color:#666; font-style:italic;">El mapa aparecerá aquí al cargar el código...</p>
        </div>
        <div id="editor-ramas" style="margin-top:20px;"></div>
        <button class="btn" style="background:#2d3436; color:white;" onclick="agregarRama()">+ Añadir Nueva Pregunta</button>
    </div>

    <button class="btn btn-main" onclick="ensamblarYGenerar()">3. GENERAR Y ACTUALIZAR CÓDIGO FINAL</button>

    <div id="resultado-container" class="card" style="display:none;">
        <h2>Código Finalizado</h2>
        <p>Copia este código y sustitúyelo en GitHub:</p>
        <textarea id="codigo-final" style="height: 300px; background: #1e1e1e;"></textarea>
    </div>
</div>

<script>
    function cargarArbolDesdeCodigo() {
        const codigo = document.getElementById('html-base').value;
        const regex = /const arbol = (\{[\s\S]*?\});/;
        const match = codigo.match(regex);

        if (match) {
            try {
                const arbolObj = JSON.parse(match[1]);
                document.getElementById('editor-ramas').innerHTML = ""; // Limpiar
                
                for (let id in arbolObj) {
                    crearCajaRama(id, arbolObj[id]);
                }
                dibujarMapa();
            } catch (e) {
                console.log("Esperando código válido...");
            }
        }
    }

    function crearCajaRama(id, datos) {
        const div = document.createElement('div');
        div.className = 'node-box';
        div.setAttribute('data-id', id);
        
        let htmlOpciones = "";
        datos.respuestas.forEach((resp, index) => {
            htmlOpciones += `
                <div class="option-card">
                    <label class="badge">RESPUESTA</label><input type="text" class="opt-text" value="${resp.texto}" oninput="dibujarMapa()">
                    <label class="badge">SALTO A</label><input type="text" class="opt-jump" value="${resp.salto}" oninput="dibujarMapa()">
                    <label class="badge">PAN</label><input type="text" class="opt-pan" value="${resp.pan || ''}" style="font-style:italic; background:#eef;" oninput="dibujarMapa()">
                </div>`;
        });

        div.innerHTML = `
            ${id !== 'inicio' ? '<button class="btn-del" onclick="this.parentElement.remove(); dibujarMapa()">Eliminar</button>' : ''}
            <strong>ID Rama:</strong> ${id === 'inicio' ? 'inicio' : `<input type="text" class="rama-id-input" value="${id}" oninput="dibujarMapa()">`}
            <input type="text" class="q-text" value="${datos.pregunta}" style="margin-top:10px" oninput="dibujarMapa()">
            <div class="grid-options">${htmlOpciones}</div>
            <button class="btn" style="font-size:10px; margin-top:10px; background:#2ecc71; color:white" onclick="agregarOpcion(this)">+ Opción</button>
        `;
        document.getElementById('editor-ramas').appendChild(div);
    }

    function agregarRama() {
        const idTemp = "nueva_rama_" + Date.now();
        crearCajaRama(idTemp, { pregunta: "", respuestas: [{ texto: "", salto: "final", pan: "" }] });
        dibujarMapa();
    }

    function agregarOpcion(btn) {
        const container = btn.previousElementSibling;
        const div = document.createElement('div');
        div.className = 'option-card';
        div.innerHTML = `
            <label class="badge">RESPUESTA</label><input type="text" class="opt-text" oninput="dibujarMapa()">
            <label class="badge">SALTO A</label><input type="text" class="opt-jump" oninput="dibujarMapa()">
            <label class="badge">PAN</label><input type="text" class="opt-pan" style="font-style:italic; background:#eef;" oninput="dibujarMapa()">`;
        container.appendChild(div);
        dibujarMapa();
    }

    function dibujarMapa() {
        const mapa = document.getElementById('mapa-visual');
        mapa.innerHTML = "";
        
        document.querySelectorAll('.node-box').forEach(box => {
            const idInput = box.querySelector('.rama-id-input');
            const id = box.getAttribute('data-id') === 'inicio' ? 'inicio' : (idInput ? idInput.value : "?");
            
            const nodoDiv = document.createElement('div');
            nodoDiv.className = 'mapa-nodo';
            let contenido = `<strong>${id.toUpperCase()}</strong><br>`;
            
            box.querySelectorAll('.opt-jump').forEach(jump => {
                const destino = jump.value || "...";
                contenido += `<span style="color:#666">→</span> <span style="${destino === 'final' ? 'color:green;font-weight:bold' : ''}">${destino}</span><br>`;
            });
            
            nodoDiv.innerHTML = contenido;
            mapa.appendChild(nodoDiv);
        });
    }

    function ensamblarYGenerar() {
        const htmlBase = document.getElementById('html-base').value;
        const ramas = {};
        
        document.querySelectorAll('.node-box').forEach(box => {
            const idInput = box.querySelector('.rama-id-input');
            const id = box.getAttribute('data-id') === 'inicio' ? 'inicio' : idInput.value;
            if(!id) return;

            const opciones = [];
            box.querySelectorAll('.option-card').forEach(opt => {
                opciones.push({
                    "texto": opt.querySelector('.opt-text').value,
                    "salto": opt.querySelector('.opt-jump').value,
                    "pan": opt.querySelector('.opt-pan').value
                });
            });
            ramas[id] = { "pregunta": box.querySelector('.q-text').value, "respuestas": opciones };
        });

        const nuevoArbolJs = "const arbol = " + JSON.stringify(ramas, null, 4) + ";";
        const htmlFinal = htmlBase.replace(/const arbol = \{[\s\S]*?\};/, nuevoArbolJs);
        document.getElementById('codigo-final').value = htmlFinal;
        document.getElementById('resultado-container').style.display = 'block';
    }
</script>
</body>
</html>
