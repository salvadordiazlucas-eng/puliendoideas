<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Constructor Maestro V3 | Puliendo Ideas</title>
    <style>
        :root { --cobalto: #0072ff; --noche: #020617; --pizarra: #1e293b; --texto: #f8fafc; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--noche); color: var(--texto); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 450px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .preview { flex-grow: 1; background: #334155; display: flex; flex-direction: column; position: relative; }
        
        .device-toggle { background: #1e293b; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #334155; }
        .btn-device { background: #334155; border: none; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .btn-device.active { background: var(--cobalto); }

        iframe { width: 100%; height: 100%; border: none; transition: width 0.3s ease; margin: 0 auto; background: white; }
        .mobile-view { width: 375px; height: 667px; margin: 20px auto; border: 10px solid #000; border-radius: 20px; }

        .modulo-card { background: var(--pizarra); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--cobalto); position: relative; }
        .controls-pos { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-pos { background: #0f172a; border: 1px solid #334155; color: white; cursor: pointer; border-radius: 4px; padding: 2px 8px; font-size: 10px; }

        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; margin-top: 5px; box-sizing: border-box; }
        
        .btn-main { background: var(--cobalto); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-import { background: #475569; margin-bottom: 10px; font-size: 12px; }
        .btn-add { background: transparent; border: 1px dashed var(--cobalto); color: var(--cobalto); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Constructor Maestro V3</h2>
    
    <div id="importArea">
        <label style="font-size: 11px; color: #94a3b8;">PEGA AQUÍ EL HTML DEL CLIENTE:</label>
        <textarea id="rawInput" style="height: 80px; font-family: monospace; font-size: 10px;" placeholder="<!DOCTYPE html>..."></textarea>
        <button class="btn-main btn-import" onclick="importarHTML()">Analizar y Convertir en Módulos</button>
    </div>

    <hr style="opacity: 0.1; margin: 15px 0;">
    
    <button class="btn-main btn-add" onclick="abrirSelectorModulos()">+ Añadir Módulo Nuevo</button>
    
    <div id="editorInputs">
        </div>

    <button class="btn-main" style="background: var(--success); margin-top: 30px;" onclick="descargarHTML()">Descargar Proyecto Final</button>
</div>

<div class="preview">
    <div class="device-toggle">
        <button class="btn-device active" onclick="setDevice('pc', this)">💻 Computador</button>
        <button class="btn-device" onclick="setDevice('mobile', this)">📱 Móvil</button>
    </div>
    <iframe id="vistaPrevia"></iframe>
</div>

<div id="modalModulos" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--pizarra); padding:30px; border-radius:20px; z-index:1000; border:1px solid var(--cobalto); box-shadow: 0 0 50px rgba(0,0,0,0.8);">
    <h3>Nuevo Módulo</h3>
    <select id="tipoNuevoModulo">
        <option value="hero">Hero (Imagen + Texto)</option>
        <option value="texto">Bloque de Texto</option>
        <option value="imagen">Imagen Centrada</option>
    </select>
    <button class="btn-main" onclick="crearModuloVacio()">Insertar</button>
    <button class="btn-main" style="background:#64748b;" onclick="document.getElementById('modalModulos').style.display='none'">Cerrar</button>
</div>

<script>
    let modulos = [];
    const htmlBase = `<!DOCTYPE html><html lang="es"><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{margin:0;font-family:sans-serif;line-height:1.6}section{padding:50px 20px;text-align:center;border-bottom:1px solid #eee}img{max-width:100%;height:auto;border-radius:8px}h1{margin-top:0}@media(max-width:768px){section{padding:30px 15px}}</style></head><body><div id="render-area"></div></body></html>`;

    function importarHTML() {
        const raw = document.getElementById('rawInput').value;
        const parser = new DOMParser();
        const doc = parser.parseFromString(raw, 'text/html');
        const sections = doc.querySelectorAll('section, header, footer');
        
        modulos = []; // Limpiamos
        sections.forEach((s, i) => {
            modulos.push({
                id: Date.now() + i,
                tipo: 'importado',
                titulo: s.querySelector('h1, h2, h3')?.innerText || 'Sección ' + (i+1),
                contenido: s.querySelector('p')?.innerText || '',
                img: s.querySelector('img')?.getAttribute('src') || ''
            });
        });
        renderUI();
    }

    function crearModuloVacio() {
        modulos.push({
            id: Date.now(),
            tipo: document.getElementById('tipoNuevoModulo').value,
            titulo: 'Nuevo Título',
            contenido: 'Escribe aquí el contenido...',
            img: 'logo.png'
        });
        document.getElementById('modalModulos').style.display = 'none';
        renderUI();
    }

    function renderUI() {
        const container = document.getElementById('editorInputs');
        container.innerHTML = '';
        let htmlAcumulado = '';

        modulos.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'modulo-card';
            card.innerHTML = `
                <div class="controls-pos">
                    <button class="btn-pos" onclick="mover(${i},-1)">▲</button>
                    <button class="btn-pos" onclick="mover(${i},1)">▼</button>
                    <button class="btn-pos" style="color:#ff4444" onclick="eliminar(${i})">✕</button>
                </div>
                <h3 style="font-size:10px; opacity:0.5">${m.tipo}</h3>
                <input type="text" value="${m.titulo}" oninput="modulos[${i}].titulo=this.value; actualizarVp()">
                <textarea oninput="modulos[${i}].contenido=this.value; actualizarVp()">${m.contenido}</textarea>
                <input type="text" value="${m.img}" placeholder="Ruta imagen" oninput="modulos[${i}].img=this.value; actualizarVp()">
            `;
            container.appendChild(card);
            
            htmlAcumulado += `<section>
                ${m.img ? `<img src="${m.img}" style="max-width:300px">` : ''}
                <h1>${m.titulo}</h1>
                <p>${m.contenido}</p>
            </section>`;
        });
        
        window.ultimoHtml = htmlAcumulado;
        actualizarVp();
    }

    function actualizarVp() {
        let full = '';
        modulos.forEach(m => {
            full += `<section>
                ${m.img ? `<img src="${m.img}" style="max-width:300px; display:block; margin: 0 auto 20px;">` : ''}
                <h1>${m.titulo}</h1>
                <p>${m.contenido}</p>
            </section>`;
        });
        const iframe = document.getElementById('vistaPrevia');
        iframe.srcdoc = htmlBase.replace('<div id="render-area"></div>', full);
    }

    function mover(index, delta) {
        const n = index + delta;
        if(n >= 0 && n < modulos.length) {
            [modulos[index], modulos[n]] = [modulos[n], modulos[index]];
            renderUI();
        }
    }

    function eliminar(i) { modulos.splice(i,1); renderUI(); }
    function setDevice(t, b) {
        const f = document.getElementById('vistaPrevia');
        document.querySelectorAll('.btn-device').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        f.className = (t==='mobile') ? 'mobile-view' : '';
    }
    function abrirSelectorModulos() { document.getElementById('modalModulos').style.display='block'; }
    function descargarHTML() {
        const iframe = document.getElementById('vistaPrevia');
        const blob = new Blob([iframe.srcdoc], {type:'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'web-puliendo-ideas.html';
        a.click();
    }
</script>
</body>
</html>
